services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_AIRTABLE_API_KEY: ${VITE_AIRTABLE_API_KEY}
        VITE_AIRTABLE_BASE_ID: ${VITE_AIRTABLE_BASE_ID}
        VITE_AIRTABLE_TABLE_NAME: ${VITE_AIRTABLE_TABLE_NAME}
    expose:
      - "80"
    restart: unless-stopped
    labels:
      - "traefik.http.services.client.loadbalancer.server.port=80"
      - "traefik.enable=true"
      - "traefik.http.routers.equallegalaid-app.rule=Host(`equallegalaid.services.d4g.fr`)"
      - "traefik.http.routers.equallegalaid-app.entryPoints=webtls"
      - "traefik.http.routers.equallegalaid-app.tls=true"
      - "traefik.docker.network=d4g-internal"